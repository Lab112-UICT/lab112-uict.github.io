<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="icons/bootstrap-icons.css" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <title>Login — LAB 112</title>
  <style>
    :root{--navy:#0a1628;--amber:#f0a500;--amber-light:#ffc94a;--cream:#f5ede0;--teal:#0d9488;--teal-light:#14b8a6;--text-dim:#8899aa;--card-bg:rgba(17,34,64,0.85);--border:rgba(240,165,0,0.2);--font-display:'Syne',sans-serif;--font-mono:'Space Mono',monospace;--font-body:'Inter',sans-serif;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background-color:var(--navy);color:var(--cream);font-family:var(--font-body);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 30%,rgba(13,148,136,0.15) 0%,transparent 60%),radial-gradient(ellipse 60% 80% at 80% 70%,rgba(240,165,0,0.1) 0%,transparent 60%);pointer-events:none;}
    body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(240,165,0,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(240,165,0,0.04) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;}

    .login-wrap{position:relative;z-index:1;width:100%;max-width:400px;}

    .login-logo{text-align:center;margin-bottom:2rem;}
    .logo-mark{font-family:var(--font-mono);font-size:1.5rem;font-weight:700;color:var(--amber);letter-spacing:3px;}
    .logo-mark span{color:var(--cream);}
    .logo-sub{font-size:0.78rem;color:var(--text-dim);margin-top:0.3rem;letter-spacing:0.5px;}

    .login-card{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:2rem;backdrop-filter:blur(20px);box-shadow:0 24px 64px rgba(0,0,0,0.5);}

    .card-title{font-family:var(--font-display);font-size:1.4rem;font-weight:800;margin-bottom:0.25rem;}
    .card-sub{font-size:0.82rem;color:var(--text-dim);margin-bottom:2rem;}

    .form-group{margin-bottom:1.25rem;}
    .form-label{display:block;font-size:0.78rem;font-weight:600;color:var(--text-dim);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:0.5rem;font-family:var(--font-mono);}
    .form-input{width:100%;background:rgba(10,22,40,0.6);border:1px solid var(--border);border-radius:6px;padding:0.75rem 1rem;color:var(--cream);font-family:var(--font-body);font-size:0.9rem;outline:none;transition:border-color 0.2s;}
    .form-input::placeholder{color:var(--text-dim);}
    .form-input:focus{border-color:rgba(240,165,0,0.6);}

    .btn-login{width:100%;background:var(--amber);color:var(--navy);border:none;border-radius:6px;padding:0.85rem;font-family:var(--font-display);font-size:0.95rem;font-weight:800;cursor:pointer;transition:all 0.2s;letter-spacing:0.5px;margin-top:0.5rem;}
    .btn-login:hover{background:var(--amber-light);transform:translateY(-1px);box-shadow:0 8px 20px rgba(240,165,0,0.3);}

    .error-msg{display:none;background:rgba(251,113,133,0.1);border:1px solid rgba(251,113,133,0.25);border-radius:6px;padding:0.75rem 1rem;font-size:0.82rem;color:#fb7185;margin-bottom:1rem;}
    .error-msg.visible{display:block;}

    .login-footer{text-align:center;margin-top:1.5rem;font-size:0.78rem;color:var(--text-dim);}
    .login-footer a{color:var(--amber);text-decoration:none;}

    .divider{border:none;border-top:1px solid var(--border);margin:1.5rem 0;}

    .hint-box{background:rgba(13,148,136,0.07);border:1px solid rgba(13,148,136,0.2);border-radius:6px;padding:0.75rem 1rem;font-size:0.78rem;color:var(--text-dim);margin-top:1.5rem;}
    .hint-box strong{color:var(--teal-light);}
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">
      <div class="logo-mark">LAB<span>112</span></div>
      <div class="logo-sub">UICT · Professional Certificate in Software Engineering</div>
    </div>

    <div class="login-card">
      <div class="card-title">Welcome back</div>
      <div class="card-sub">Enter your student ID and PIN to access the portal.</div>

      <div class="error-msg" id="error-msg">
        <i class="bi bi-exclamation-circle"></i> Incorrect Student ID or PIN. Please try again.
      </div>

      <div class="form-group">
        <label class="form-label" for="student-id">Student ID</label>
        <input type="text" id="student-id" class="form-input" placeholder="e.g. UICT2025001" autocomplete="username" />
      </div>

      <div class="form-group">
        <label class="form-label" for="pin">PIN</label>
        <input type="password" id="pin" class="form-input" placeholder="Enter your PIN" autocomplete="current-password" maxlength="8" />
      </div>

      <button class="btn-login" onclick="handleLogin()">
        <i class="bi bi-box-arrow-in-right"></i> Sign In
      </button>

      <hr class="divider" />

      <div class="hint-box">
        <strong>Demo access:</strong> Use Student ID <code>student</code> and PIN <code>1234</code> to explore the portal.
      </div>
    </div>

    <div class="login-footer">
      <a href="HomePage.html"><i class="bi bi-arrow-left"></i> Back to Home</a>
    </div>
  </div>

  <script>
    // Simple PIN-based login — no server needed
    // In the future you can replace this with a real API call
    const USERS = {
      'student': '1234',
      'lab112': '0000',
    };

    function handleLogin() {
      const id = document.getElementById('student-id').value.trim().toLowerCase();
      const pin = document.getElementById('pin').value.trim();
      const errorMsg = document.getElementById('error-msg');

      if (USERS[id] && USERS[id] === pin) {
        sessionStorage.setItem('lab112_user', id);
        window.location.href = 'HomePage.html';
      } else {
        errorMsg.classList.add('visible');
        document.getElementById('pin').value = '';
      }
    }

    document.getElementById('pin').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleLogin();
    });

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
  </script>
</body>
</html>
