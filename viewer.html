<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="icons/bootstrap-icons.css" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <title>PDF Viewer — LAB 112</title>
  <style>
    :root{--navy:#0a1628;--amber:#f0a500;--amber-light:#ffc94a;--cream:#f5ede0;--teal:#0d9488;--teal-light:#14b8a6;--text-dim:#8899aa;--card-bg:rgba(17,34,64,0.85);--border:rgba(240,165,0,0.2);--font-display:'Syne',sans-serif;--font-mono:'Space Mono',monospace;--font-body:'Inter',sans-serif;}
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;overflow:hidden;}
    body{background-color:var(--navy);color:var(--cream);font-family:var(--font-body);display:flex;flex-direction:column;}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 10% 20%,rgba(13,148,136,0.1) 0%,transparent 60%);pointer-events:none;z-index:0;}

    /* NAVBAR */
    .navbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;height:56px;background:rgba(10,22,40,0.98);border-bottom:1px solid var(--border);z-index:10;}
    .nav-logo{font-family:var(--font-mono);font-size:1rem;font-weight:700;color:var(--amber);letter-spacing:2px;text-decoration:none;}
    .nav-logo span{color:var(--cream);font-weight:400;}
    .nav-label{font-family:var(--font-mono);font-size:0.6rem;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;}

    /* TOOLBAR */
    .toolbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0.5rem 1rem;background:rgba(10,22,40,0.98);border-bottom:1px solid var(--border);gap:0.5rem;z-index:10;flex-wrap:wrap;}
    .toolbar-left{display:flex;align-items:center;gap:0.6rem;min-width:0;}
    .toolbar-right{display:flex;align-items:center;gap:0.4rem;flex-shrink:0;}

    .back-btn{display:inline-flex;align-items:center;gap:0.35rem;background:rgba(240,165,0,0.1);border:1px solid rgba(240,165,0,0.3);color:var(--amber);padding:0.35rem 0.8rem;border-radius:5px;font-size:0.78rem;font-family:var(--font-display);font-weight:700;text-decoration:none;white-space:nowrap;}
    .pdf-title{font-family:var(--font-display);font-size:0.8rem;font-weight:700;color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px;}

    .tool-btn{background:var(--card-bg);border:1px solid var(--border);color:var(--cream);width:34px;height:34px;border-radius:5px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:0.95rem;transition:all 0.2s;flex-shrink:0;}
    .tool-btn:hover{border-color:rgba(240,165,0,0.5);color:var(--amber);}
    .tool-btn:disabled{opacity:0.3;cursor:default;}

    .page-info{font-family:var(--font-mono);font-size:0.7rem;color:var(--text-dim);white-space:nowrap;padding:0 0.25rem;}

    .save-btn{display:inline-flex;align-items:center;gap:0.35rem;background:rgba(13,148,136,0.12);border:1px solid rgba(13,148,136,0.3);color:var(--teal-light);padding:0.35rem 0.8rem;border-radius:5px;font-size:0.78rem;font-family:var(--font-display);font-weight:700;text-decoration:none;white-space:nowrap;}

    /* VIEWER */
    .viewer-wrap{flex:1;overflow-y:auto;overflow-x:auto;display:flex;align-items:flex-start;justify-content:center;background:#2a2a2a;position:relative;z-index:1;}
    .canvas-container{margin:1.5rem auto;display:flex;flex-direction:column;align-items:center;}
    canvas{display:block;box-shadow:0 4px 24px rgba(0,0,0,0.6);}

    /* STATES */
    .center-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;padding:3rem 2rem;text-align:center;width:100%;}
    .spin{animation:spin 1s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .state-icon{font-size:2.2rem;}
    .state-title{font-family:var(--font-display);font-size:1.1rem;font-weight:700;color:var(--cream);}
    .state-sub{font-size:0.82rem;color:var(--text-dim);max-width:300px;line-height:1.7;}

    @media(max-width:480px){
      .pdf-title{max-width:100px;}
      .nav-label{display:none;}
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="PDFs.html" class="nav-logo">LAB<span>112</span></a>
    <span class="nav-label">PDF Viewer</span>
  </nav>

  <div class="toolbar">
    <div class="toolbar-left">
      <a href="PDFs.html" class="back-btn"><i class="bi bi-arrow-left"></i> Back</a>
      <div class="pdf-title" id="pdf-title">Loading...</div>
    </div>
    <div class="toolbar-right">
      <button class="tool-btn" id="prev-btn" onclick="changePage(-1)" title="Previous page" disabled><i class="bi bi-chevron-up"></i></button>
      <span class="page-info" id="page-info">— / —</span>
      <button class="tool-btn" id="next-btn" onclick="changePage(1)" title="Next page" disabled><i class="bi bi-chevron-down"></i></button>
      <button class="tool-btn" onclick="zoomOut()" title="Zoom out"><i class="bi bi-zoom-out"></i></button>
      <button class="tool-btn" onclick="zoomIn()" title="Zoom in"><i class="bi bi-zoom-in"></i></button>
      <a href="#" id="save-btn" class="save-btn" download><i class="bi bi-download"></i> Save</a>
    </div>
  </div>

  <div class="viewer-wrap" id="viewer-wrap">
    <div class="center-state" id="loading-state">
      <i class="bi bi-arrow-repeat spin state-icon" style="color:var(--amber);"></i>
      <div class="state-title">Loading PDF...</div>
      <div class="state-sub">Please wait while the document loads.</div>
    </div>
    <div class="center-state" id="error-state" style="display:none;">
      <i class="bi bi-exclamation-circle state-icon" style="color:#fb7185;"></i>
      <div class="state-title">Could not load PDF</div>
      <div class="state-sub">The file may not be uploaded to GitHub yet, or the filename has changed. Try the Save button to download it instead.</div>
      <a href="#" id="error-dl" class="back-btn" download style="margin-top:0.5rem;"><i class="bi bi-download"></i> Try downloading instead</a>
    </div>
    <div class="canvas-container" id="canvas-container" style="display:none;">
      <canvas id="pdf-canvas"></canvas>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';

    const params = new URLSearchParams(window.location.search);
    const fileParam = params.get('file');

    let pdfDoc = null;
    let currentPage = 1;
    let totalPages = 0;
    let isRendering = false;
    // Detect mobile and set appropriate scale
    const isMobile = window.innerWidth <= 768;
    let currentScale = isMobile ? 1.0 : 1.5;

    if (!fileParam) {
      showError();
    } else {
      const fileName = decodeURIComponent(fileParam.split('/').pop().replace('.pdf', ''));
      document.getElementById('pdf-title').textContent = fileName;
      document.title = fileName + ' — LAB 112';
      document.getElementById('save-btn').href = fileParam;
      document.getElementById('error-dl').href = fileParam;
      loadPDF(fileParam);
    }

    async function loadPDF(url) {
      try {
        const loadingTask = pdfjsLib.getDocument(url);
        pdfDoc = await loadingTask.promise;
        totalPages = pdfDoc.numPages;

        document.getElementById('loading-state').style.display = 'none';
        document.getElementById('canvas-container').style.display = 'flex';
        document.getElementById('next-btn').disabled = false;
        if (totalPages > 1) document.getElementById('prev-btn').disabled = false;

        updatePageInfo();
        await renderPage(currentPage);
      } catch (err) {
        console.error('PDF load error:', err);
        showError();
      }
    }

    async function renderPage(num) {
      if (isRendering) return;
      isRendering = true;

      try {
        const page = await pdfDoc.getPage(num);

        // Calculate scale to fit screen width on mobile
        const containerWidth = document.getElementById('viewer-wrap').clientWidth - 32;
        const viewport = page.getViewport({ scale: 1 });
        const autoScale = Math.min(containerWidth / viewport.width, currentScale);
        const finalScale = autoScale;

        const scaledViewport = page.getViewport({ scale: finalScale });

        const canvas = document.getElementById('pdf-canvas');
        const ctx = canvas.getContext('2d');

        // Use device pixel ratio for sharp rendering
        const dpr = window.devicePixelRatio || 1;
        canvas.width = Math.floor(scaledViewport.width * dpr);
        canvas.height = Math.floor(scaledViewport.height * dpr);
        canvas.style.width = Math.floor(scaledViewport.width) + 'px';
        canvas.style.height = Math.floor(scaledViewport.height) + 'px';

        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        await page.render({
          canvasContext: ctx,
          viewport: scaledViewport,
          transform: dpr !== 1 ? [dpr, 0, 0, dpr, 0, 0] : null
        }).promise;

        // Scroll viewer to top when page changes
        document.getElementById('viewer-wrap').scrollTop = 0;

        updatePageInfo();
        updateButtons();
      } catch (err) {
        console.error('Page render error:', err);
      }

      isRendering = false;
    }

    function changePage(delta) {
      const newPage = currentPage + delta;
      if (newPage < 1 || newPage > totalPages) return;
      currentPage = newPage;
      renderPage(currentPage);
    }

    function zoomIn() {
      if (currentScale >= 3.0) return;
      currentScale += 0.25;
      renderPage(currentPage);
    }

    function zoomOut() {
      if (currentScale <= 0.5) return;
      currentScale -= 0.25;
      renderPage(currentPage);
    }

    function updatePageInfo() {
      document.getElementById('page-info').textContent = `${currentPage} / ${totalPages}`;
    }

    function updateButtons() {
      document.getElementById('prev-btn').disabled = currentPage <= 1;
      document.getElementById('next-btn').disabled = currentPage >= totalPages;
    }

    function showError() {
      document.getElementById('loading-state').style.display = 'none';
      document.getElementById('canvas-container').style.display = 'none';
      document.getElementById('error-state').style.display = 'flex';
      document.getElementById('pdf-title').textContent = 'Error';
    }

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') changePage(1);
      if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') changePage(-1);
    });

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
  </script>
</body>
</html>
